# Docker Compose — Caracal Dev Gateway Stub
#
# Starts the lightweight gateway stub for local development.
# The stub mimics the enterprise gateway API surface (port 8444).
#
# Usage:
#   docker-compose -f docker-compose.gateway.yml up -d
#   docker-compose -f docker-compose.gateway.yml logs -f gateway
#   docker-compose -f docker-compose.gateway.yml down

services:
  gateway:
    image: python:3.11-slim
    container_name: caracal-gateway-dev
    working_dir: /app
    volumes:
      - ./scripts/dev_gateway.py:/app/dev_gateway.py:ro
    command: >
      sh -c "pip install --quiet fastapi uvicorn &&
             python3 dev_gateway.py"
    environment:
      GATEWAY_PORT: "${GATEWAY_PORT:-8444}"
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
      GATEWAY_ADMIN_KEY: "${GATEWAY_ADMIN_KEY:-}"
    ports:
      - "${GATEWAY_PORT:-8444}:${GATEWAY_PORT:-8444}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:${GATEWAY_PORT:-8444}/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
