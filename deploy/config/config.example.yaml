# Caracal OSS deployment configuration.
# This example matches the current broker-only open-source architecture.

storage:
  backup_dir: ${CARACAL_HOME:~/.caracal}/backups
  backup_count: 3

database:
  host: ${CARACAL_DB_HOST:localhost}
  port: ${CARACAL_DB_PORT:5432}
  database: ${CARACAL_DB_NAME:caracal}
  user: ${CARACAL_DB_USER:caracal}
  password: ${CARACAL_DB_PASSWORD:caracal}
  pool_size: ${CARACAL_DB_POOL_SIZE:10}
  max_overflow: ${CARACAL_DB_MAX_OVERFLOW:5}
  pool_timeout: ${CARACAL_DB_POOL_TIMEOUT:30}

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: ${REDIS_DB:0}
  ssl: false
  metrics_cache_ttl: 3600
  allowlist_cache_ttl: 60

mcp_adapter:
  enabled: true
  listen_address: ${CARACAL_MCP_LISTEN_ADDRESS:0.0.0.0:8080}
  mcp_server_urls: []
  health_check_enabled: true

merkle:
  batch_size_limit: 1000
  batch_timeout_seconds: 300
  signing_algorithm: ES256
  signing_backend: software
  private_key_path: ${CARACAL_HOME:~/.caracal}/keys/merkle_signing_key.pem
  key_rotation_enabled: false

snapshot:
  enabled: true
  schedule_cron: "0 0 * * *"
  retention_days: 90
  storage_path: ${CARACAL_HOME:~/.caracal}/snapshots
  compression_enabled: true
  auto_cleanup_enabled: true

allowlist:
  enabled: true
  default_behavior: allow
  cache_ttl: 60
  max_patterns_per_agent: 1000

defaults:
  time_window: daily

logging:
  level: ${LOG_LEVEL:INFO}
  file: ${CARACAL_HOME:~/.caracal}/logs/caracal.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  policy_eval_timeout_ms: 100
  ledger_write_timeout_ms: 10
  file_lock_timeout_s: 5
  max_retries: 3
