name: caracal

services:
  postgres:
    image: postgres:16-alpine
    container_name: caracal-postgres
    environment:
      POSTGRES_DB: ${CARACAL_DB_NAME:-caracal}
      POSTGRES_USER: ${CARACAL_DB_USER:-caracal}
      POSTGRES_PASSWORD: ${CARACAL_DB_PASSWORD:-caracal}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CARACAL_DB_USER:-caracal} -d ${CARACAL_DB_NAME:-caracal}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - caracal-runtime

  redis:
    image: redis:7-alpine
    container_name: caracal-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - caracal-runtime

  mcp:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.runtime
    image: ${CARACAL_RUNTIME_IMAGE:-caracal-runtime:latest}
    container_name: caracal-mcp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CARACAL_RUNTIME_IN_CONTAINER: "1"
      CARACAL_WORKSPACE_ROOT: /home/caracal/.caracal
      CARACAL_API_URL: http://mcp:8080
      CARACAL_CONFIG_PATH: /home/caracal/.caracal/config.yaml
      CARACAL_MCP_LISTEN_ADDRESS: 0.0.0.0:8080
      CARACAL_GATEWAY_URL: ${CARACAL_GATEWAY_URL:-}
      CARACAL_GATEWAY_ENDPOINT: ${CARACAL_GATEWAY_ENDPOINT:-}
      CARACAL_GATEWAY_ENABLED: ${CARACAL_GATEWAY_ENABLED:-false}
      CARACAL_ENV_MODE: ${CARACAL_ENV_MODE:-dev}
      CARACAL_DEBUG_LOGS: ${CARACAL_DEBUG_LOGS:-false}
      CARACAL_JSON_LOGS: ${CARACAL_JSON_LOGS:-false}
      CARACAL_DB_HOST: postgres
      CARACAL_DB_PORT: 5432
      CARACAL_DB_NAME: ${CARACAL_DB_NAME:-caracal}
      CARACAL_DB_USER: ${CARACAL_DB_USER:-caracal}
      CARACAL_DB_PASSWORD: ${CARACAL_DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "-m", "caracal.mcp.service"]
    volumes:
      - caracal_state:/home/caracal/.caracal
    ports:
      - "${MCP_ADAPTER_PORT:-8000}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - caracal-runtime

  cli:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.runtime
    image: ${CARACAL_RUNTIME_IMAGE:-caracal-runtime:latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CARACAL_RUNTIME_IN_CONTAINER: "1"
      CARACAL_WORKSPACE_ROOT: /home/caracal/.caracal
      CARACAL_API_URL: http://mcp:8080
      CARACAL_CONFIG_PATH: /home/caracal/.caracal/config.yaml
      CARACAL_GATEWAY_URL: ${CARACAL_GATEWAY_URL:-}
      CARACAL_GATEWAY_ENDPOINT: ${CARACAL_GATEWAY_ENDPOINT:-}
      CARACAL_GATEWAY_ENABLED: ${CARACAL_GATEWAY_ENABLED:-false}
      CARACAL_ENV_MODE: ${CARACAL_ENV_MODE:-dev}
      CARACAL_DEBUG_LOGS: ${CARACAL_DEBUG_LOGS:-false}
      CARACAL_JSON_LOGS: ${CARACAL_JSON_LOGS:-false}
      CARACAL_DB_HOST: postgres
      CARACAL_DB_PORT: 5432
      CARACAL_DB_NAME: ${CARACAL_DB_NAME:-caracal}
      CARACAL_DB_USER: ${CARACAL_DB_USER:-caracal}
      CARACAL_DB_PASSWORD: ${CARACAL_DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["caracal"]
    volumes:
      - caracal_state:/home/caracal/.caracal
    stdin_open: true
    tty: true
    networks:
      - caracal-runtime

  flow:
    profiles: ["tui"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.runtime
    image: ${CARACAL_RUNTIME_IMAGE:-caracal-runtime:latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CARACAL_RUNTIME_IN_CONTAINER: "1"
      CARACAL_WORKSPACE_ROOT: /home/caracal/.caracal
      CARACAL_API_URL: http://mcp:8080
      CARACAL_CONFIG_PATH: /home/caracal/.caracal/config.yaml
      CARACAL_GATEWAY_URL: ${CARACAL_GATEWAY_URL:-}
      CARACAL_GATEWAY_ENDPOINT: ${CARACAL_GATEWAY_ENDPOINT:-}
      CARACAL_GATEWAY_ENABLED: ${CARACAL_GATEWAY_ENABLED:-false}
      CARACAL_ENV_MODE: ${CARACAL_ENV_MODE:-dev}
      CARACAL_DEBUG_LOGS: ${CARACAL_DEBUG_LOGS:-false}
      CARACAL_JSON_LOGS: ${CARACAL_JSON_LOGS:-false}
      TERM: xterm-256color
      COLORTERM: truecolor
      CARACAL_DB_HOST: postgres
      CARACAL_DB_PORT: 5432
      CARACAL_DB_NAME: ${CARACAL_DB_NAME:-caracal}
      CARACAL_DB_USER: ${CARACAL_DB_USER:-caracal}
      CARACAL_DB_PASSWORD: ${CARACAL_DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "-m", "caracal.flow.main"]
    volumes:
      - caracal_state:/home/caracal/.caracal
    stdin_open: true
    tty: true
    networks:
      - caracal-runtime

volumes:
  postgres_data:
  redis_data:
  caracal_state:

networks:
  caracal-runtime:
    name: ${CARACAL_RUNTIME_NETWORK:-caracal-runtime}
