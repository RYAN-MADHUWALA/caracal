name: caracal

services:
  postgres:
    image: postgres:16-alpine
    container_name: caracal-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-caracal}
      POSTGRES_USER: ${DB_USER:-caracal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-caracal}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-caracal} -d ${DB_NAME:-caracal}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: caracal-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  mcp:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.mcp
    image: caracal-mcp:latest
    container_name: caracal-mcp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CARACAL_CONFIG_PATH: /home/caracal/.caracal/config.yaml
      CARACAL_MCP_LISTEN_ADDRESS: 0.0.0.0:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-caracal}
      DB_USER: ${DB_USER:-caracal}
      DB_PASSWORD: ${DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - caracal_state:/home/caracal/.caracal
      - ./config/config.example.yaml:/home/caracal/.caracal/config.yaml:ro
    ports:
      - "${MCP_ADAPTER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  cli:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.cli
    image: caracal-cli:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-caracal}
      DB_USER: ${DB_USER:-caracal}
      DB_PASSWORD: ${DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - caracal_state:/home/caracal/.caracal
      - ./config/config.example.yaml:/home/caracal/.caracal/config.yaml:ro
    stdin_open: true
    tty: true

  flow:
    profiles: ["tui"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.flow
    image: caracal-flow:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      TERM: xterm-256color
      COLORTERM: truecolor
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-caracal}
      DB_USER: ${DB_USER:-caracal}
      DB_PASSWORD: ${DB_PASSWORD:-caracal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - caracal_state:/home/caracal/.caracal
      - ./config/config.example.yaml:/home/caracal/.caracal/config.yaml:ro
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  redis_data:
  caracal_state:
